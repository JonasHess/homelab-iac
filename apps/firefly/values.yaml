# Single sign-on via the shared Cognito gateway.
# The X-Auth-Email header is injected centrally by the gateway-oidc
# SecurityPolicy (global.oidc.emailClaimHeader), so Firefly needs no policy of
# its own — `enabled` stays false.
#   enabled          - (unused) would install a Firefly-scoped OIDC+JWT policy.
#   enforceRemoteUser- switch Firefly to remote_user_guard so it trusts the
#                      X-Auth-Email header (password-less login). Flip on only
#                      after confirming the header arrives and cannot be spoofed;
#                      revert to false to fall back to Firefly's own login.
sso:
  enabled: false
  enforceRemoteUser: true

generic:
  externalSecrets:
    firefly-secret:
      - APP_KEY: "/firefly/APP_KEY"
      - DB_PASSWORD: "/firefly/DB_PASSWORD"
      - STATIC_CRON_TOKEN: "/firefly/STATIC_CRON_TOKEN"
  deployment:
    image: fireflyiii/core:version-6.6.6
    ports:
      - containerPort: 8080
    pvcMounts:
      upload:
        mountPath: /var/www/html/storage/upload
        hostPath:   # set in the environment overlay, e.g. /mnt/tank1/encrypted/apps/firefly/upload
        backup:
          enabled: true
    envFrom:
      configMapRef: firefly-config
      secretRef: firefly-secret
  service:
    ports:
      - name: http
        port: 8080
  ingress:
    https:
      - subdomain: firefly
        port: 8080
        oauth: true
