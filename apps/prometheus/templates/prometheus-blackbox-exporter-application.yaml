apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-blackbox-exporter
  namespace: {{ $.Release.Namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    chart: prometheus-blackbox-exporter
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 11.12.0
    helm:
      values: |
        serviceMonitor:
          enabled: true
          labels:
            prometheus: kube-prometheus-stack-prometheus
            release: kube-prometheus-stack
        config:
          modules:
            http_2xx:
              prober: http
              timeout: 5s
              http:
                preferred_ip_protocol: "ip4"
                follow_redirects: true
                valid_status_codes: [200, 401, 403]
            {{- with $.Values.global.lanDnsCheck }}
            # Activated when the environment sets global.lanDnsCheck. Probes the
            # internal DNS server for queryName and fails if the answer isn't
            # global.gateway.loadBalancerIP — catches silent LAN→Cloudflare hairpinning.
            dns_lan_gateway:
              prober: dns
              timeout: 5s
              dns:
                query_name: {{ .queryName | quote }}
                query_type: A
                valid_rcodes: [NOERROR]
                validate_answer_rrs:
                  fail_if_not_matches_regexp:
                    - {{ printf ".*\\s+IN\\s+A\\s+%s$" ($.Values.global.gateway.loadBalancerIP | replace "." "\\.") | quote }}
            {{- end }}

  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ $.Release.Namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - Prune=true
