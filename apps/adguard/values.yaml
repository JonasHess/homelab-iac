generic:
  deployment:
    image: adguard/adguardhome:v0.107.77
    ports:
    - containerPort: 3000
    - containerPort: 53
    - containerPort: 80
    - containerPort: 443
    pvcMounts:
      config:
        mountPath: /opt/adguardhome/conf
        hostPath: ~ # /mnt/somewhere/unencrypted/apps/adguard/config
        backup:
          enabled: true

      data:
        mountPath: /opt/adguardhome/work
        hostPath: ~ # /mnt/somewhere/unencrypted/apps/adguard/data
  service:
    ports:
    - name: http
      port: 80
    - name: https
      port: 443
    # DNS exposes both protocols on port 53. The Gateway's UDPRoute resolves
    # to the UDP entry (matched by protocol + port). Without an explicit UDP
    # entry, the Service defaults to TCP-only and the UDPRoute reports
    # "UDP Port 53 not found on Service".
    - name: dns
      port: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      protocol: TCP
    - name: admin
      port: 3000
  ingress:
    https:
    - subdomain: adguard
      port: 80
      oauth: true
    - subdomain: adguard-admin
      port: 3000
      oauth: true
    udp:
    - port: 53
      listener: dns
