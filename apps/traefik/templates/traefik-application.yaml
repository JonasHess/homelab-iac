apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-ingress-controller
  namespace: {{ $.Release.Namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  project: default
  source:
    chart: traefik
    repoURL: https://helm.traefik.io/traefik
    targetRevision: 39.0.8
    helm:
      skipCrds: true
      valuesObject:
        deployment:
          enabled: true

        experimental:
          plugins:
            traefik-plugin-cloudflare:
              moduleName: "github.com/agence-gaya/traefik-plugin-cloudflare"
              version: "v1.2.0"

        ports:
          web:
            port: 80
            nodePort: 32080
            expose:
              default: true
            transport:
              respondingTimeouts:
                readTimeout: 30m
                writeTimeout: 30m
                idleTimeout: 30m
          websecure:
            port: 443
            nodePort: 32443
            expose:
              default: true
            http:
              tls:
                enabled: true
                options: ""
            transport:
              respondingTimeouts:
                readTimeout: 30m
                writeTimeout: 30m
                idleTimeout: 30m
          {{- range $key, $value := .Values.additionalExposedPorts }}
          {{ $key }}:
            port: {{ $value.port }}
            expose:
              default: true
            exposedPort: {{ $value.port }}
            protocol: {{ $value.protocol }}
          {{- end }}

        additionalArguments:
          - --entryPoints.web.proxyProtocol.insecure
          - --entryPoints.web.forwardedHeaders.insecure
          - --entrypoints.web.http.redirections.entrypoint.to=websecure
          - --entrypoints.web.http.redirections.entrypoint.scheme=https
          - --entrypoints.web.http.redirections.entrypoint.permanent=true
          - --serversTransport.insecureSkipVerify=true

        startupProbe:
          exec:
            command:
              - sh
              - -c
              - |
                DATA=$(wget -qO- http://localhost:8080/api/overview) || { echo "startup-probe: traefik API not reachable"; exit 1; }
                TOTAL=$(echo "$DATA" | sed -n 's/.*"routers":{[^}]*"total":\([0-9]*\).*/\1/p')
                ERRORS=$(echo "$DATA" | sed -n 's/.*"routers":{[^}]*"errors":\([0-9]*\).*/\1/p')
                if [ "${ERRORS:-0}" -gt 0 ]; then
                  echo "startup-probe: ${ERRORS}/${TOTAL} routers have errors (plugin may not have loaded)"
                  exit 1
                fi
                echo "startup-probe: all ${TOTAL} routers healthy"
                exit 0
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 18
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 1
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 2
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 2

        logs:
          general:
            level: INFO
          access:
            enabled: true
            fields:
              defaultMode: keep

        api:
          insecure: true
          dashboard: true

        ingressRoute:
          dashboard:
            enabled: false

        providers:
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          kubernetesGateway:
            enabled: true
            experimentalChannel: true

        gatewayClass:
          enabled: true
          name: traefik

        gateway:
          enabled: false

        service:
          enabled: true
          type: LoadBalancer
          spec:
            externalTrafficPolicy: Local
  {{- if .Values.loadBalancerIP }}
          externalIPs:
            - {{.Values.loadBalancerIP}}
  {{- end }}

        podSecurityContext:
          fsGroup: 65532
          fsGroupChangePolicy: "OnRootMismatch"

        securityContext:
          capabilities:
            drop: [ALL]
            add: [NET_BIND_SERVICE]
          readOnlyRootFilesystem: true
          runAsGroup: 0
          runAsNonRoot: false
          runAsUser: 0

  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ $.Release.Namespace }}
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - allowEmpty=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
