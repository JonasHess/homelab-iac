apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-ingress-controller-{{ $.Release.Namespace }}
  ports:
    - name: traefik
      port: 8080
      targetPort: traefik
      protocol: TCP
