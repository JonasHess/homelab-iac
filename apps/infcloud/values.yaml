generic:
  deployment:
    # Stock public nginx. Static InfCloud assets are downloaded into an
    # emptyDir by the init container below, so nothing about this image is
    # InfCloud-specific — it just serves files.
    image: nginx:1.27-alpine
    ports:
    - containerPort: 8080

    # Pinned InfCloud commit. To roll forward, update INFCLOUD_COMMIT here
    # and the same hash in the README. The init container downloads the
    # corresponding tarball from github.com at every pod start.
    initContainers:
      - name: fetch-infcloud
        image: alpine:3.20
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -eu
            apk add --no-cache --quiet ca-certificates wget tar >/dev/null
            COMMIT=53d3a95af5b58cfa3242cef645f8d40c731a7d95
            cd /tmp
            wget -qO infcloud.tar.gz "https://github.com/Unrud/RadicaleInfCloud/archive/${COMMIT}.tar.gz"
            tar -xzf infcloud.tar.gz
            cp -a "RadicaleInfCloud-${COMMIT}/radicale_infcloud/web/." /usr/share/nginx/html/
            # Inject a second <script> tag right after upstream config.js so
            # our overrides (config-overrides.js, served by nginx from a
            # ConfigMap) mutate the upstream defaults instead of having to
            # mirror the entire 1400-line config.js.
            sed -i 's|<script src="config.js"[^>]*></script>|&\n\t<script src="config-overrides.js" type="text/javascript"></script>|' /usr/share/nginx/html/index.html
        volumeMounts:
          # Volume name is auto-generated by the generic chart as
          # <appName>-<emptyDirMount key>-volume. Keep in sync with the
          # emptyDirMounts.assets key below.
          - name: infcloud-assets-volume
            mountPath: /usr/share/nginx/html

    emptyDirMounts:
      assets:
        mountPath: /usr/share/nginx/html

    configMapMounts:
      config:
        mountPath: /etc/infcloud
        configMapName: infcloud-config
      nginxconf:
        mountPath: /etc/nginx/conf.d
        configMapName: infcloud-nginx-conf

  service:
    ports:
    - name: http
      port: 8080

  ingress:
    https:
    - subdomain: contacts
      port: 8080
      oauth: true

  configMaps:
    # Override file loaded AFTER upstream config.js (init container patches
    # index.html to add a second <script> tag). We only mutate the few
    # values that differ from upstream defaults — the rest (timezone,
    # sort alphabet, datepicker, ~50 other globals InfCloud's JS expects)
    # are left at their upstream values, which avoids whack-a-mole when
    # InfCloud's code unconditionally reads globals we forgot to declare.
    #
    # globalNetworkCheckSettings.href MUST be absolute: data_process.js
    # parses it with a regex anchored on `^https?://`. The host is
    # `contacts.<domain>` (same origin InfCloud was loaded from), so
    # no CORS preflight — nginx in this pod proxies /radicale/ to the
    # in-cluster radicale-service:5232.
    infcloud-config:
      config-overrides.js: |
        // Generated for Radicale via homelab-iac. Edit values.yaml to change.
        globalNetworkCheckSettings.href = "https://contacts.{{ .Values.global.domain }}/radicale/";
        globalInterfaceLanguage = "de_DE";

    # nginx server block. Mounted at /etc/nginx/conf.d/ which shadows the
    # default.conf shipped in nginx:alpine. The location = /config.js block
    # serves the InfCloud config from /etc/infcloud (mounted from the
    # infcloud-config ConfigMap above). The /radicale/ block is a
    # same-origin DAV proxy to the in-cluster radicale-service so the
    # browser never makes a cross-origin XHR.
    infcloud-nginx-conf:
      default.conf: |
        server {
            listen 8080;
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            client_max_body_size 100m;

            gzip on;
            gzip_types text/plain text/css application/javascript application/json image/svg+xml;
            gzip_min_length 1024;

            # Upstream config.js is served straight from the emptyDir (the
            # init container puts it there). Our small overrides file lives
            # in a ConfigMap and is served at /config-overrides.js. The init
            # container patches index.html to load it right after config.js.
            location = /config-overrides.js {
                alias /etc/infcloud/config-overrides.js;
                default_type application/javascript;
                add_header Cache-Control "no-store";
            }

            location /radicale/ {
                proxy_pass http://radicale-service:5232/;
                proxy_http_version 1.1;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Script-Name     /radicale;
                proxy_pass_request_headers on;
                proxy_read_timeout 90s;
            }

            location / {
                try_files $uri $uri/ =404;
            }
        }
