generic:
  deployment:
    # Stock public nginx. Static InfCloud assets are downloaded into an
    # emptyDir by the init container below, so nothing about this image is
    # InfCloud-specific — it just serves files.
    image: nginx:1.27-alpine
    ports:
    - containerPort: 8080

    # Pinned InfCloud commit. To roll forward, update INFCLOUD_COMMIT here
    # and the same hash in the README. The init container downloads the
    # corresponding tarball from github.com at every pod start.
    initContainers:
      - name: fetch-infcloud
        image: alpine:3.20
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -eu
            apk add --no-cache --quiet ca-certificates wget tar >/dev/null
            COMMIT=53d3a95af5b58cfa3242cef645f8d40c731a7d95
            cd /tmp
            wget -qO infcloud.tar.gz "https://github.com/Unrud/RadicaleInfCloud/archive/${COMMIT}.tar.gz"
            tar -xzf infcloud.tar.gz
            cp -a "RadicaleInfCloud-${COMMIT}/radicale_infcloud/web/." /usr/share/nginx/html/
        volumeMounts:
          # Volume name is auto-generated by the generic chart as
          # <appName>-<emptyDirMount key>-volume. Keep in sync with the
          # emptyDirMounts.assets key below.
          - name: infcloud-assets-volume
            mountPath: /usr/share/nginx/html

    emptyDirMounts:
      assets:
        mountPath: /usr/share/nginx/html

    configMapMounts:
      config:
        mountPath: /etc/infcloud
        configMapName: infcloud-config
      nginxconf:
        mountPath: /etc/nginx/conf.d
        configMapName: infcloud-nginx-conf

  service:
    ports:
    - name: http
      port: 8080

  ingress:
    https:
    - subdomain: contacts
      port: 8080
      oauth: true

  configMaps:
    # InfCloud runtime config (served by nginx at /config.js — see the
    # `location = /config.js` block in the nginx ConfigMap below).
    #
    # href MUST be absolute: InfCloud's data_process.js parses the account
    # URL with a regex anchored on `^https?://`. A relative path like
    # `/radicale/` makes the regex return null and silently kills the
    # discovery flow (symptom: blank page after a successful login).
    #
    # The host is `contacts.<domain>` — the same origin InfCloud itself
    # was loaded from — so the browser still treats the XHR as same-origin
    # and no CORS preflight is involved. nginx in this pod proxies that
    # path to the in-cluster radicale-service:5232.
    # global.domain is interpolated via the generic chart's `tpl` call in
    # templates/configmap.yaml.
    infcloud-config:
      config.js: |
        // Generated for Radicale via homelab-iac. Edit values.yaml to change.
        var globalNetworkCheckSettings = {
          href: "https://contacts.{{ .Values.global.domain }}/radicale/",
          timeOut: 30000,
          lockTimeOut: 10000,
          checkContentType: true,
          settingsAccount: true,
          delegation: false,
          additionalResources: [],
          hrefLabel: null,
          forceReadOnly: null,
          ignoreAlarms: false,
          backgroundCalendars: []
        };
        var globalAccountSettings = [{
          href: "https://contacts.{{ .Values.global.domain }}/radicale/",
          hrefLabel: null,
          checkContentType: true,
          timeOut: 30000,
          lockTimeOut: 10000,
          delegation: false,
          ignoreAlarms: false,
          backgroundCalendars: []
        }];
        var globalInterfaceLanguage = "de_DE";
        var globalSortAlphabet = " 0123456789AÀÁÂÄÆÃÅĀBCÇĆČDÐEÈÉÊËĒĖĘFGHIÌÍÎİÏĪĮJKLŁĹĻŁĽMNŃÑŇŅŊOÒÓÔÖŒØÕŌPQRŔŘSŚŠŞȘẞTŢȚŤUÙÚÛÜŪŮŲVWXYÝŸZŹŻŽ";
        var globalDatepickerFirstDayOfWeek = 1;
        var globalTimeZone = "Europe/Berlin";
        var globalEnableKbNavigation = true;
        var globalEnableRefresh = true;
        var globalEnableJqueryAuthentication = true;
        var globalRewriteUrl = true;

    # nginx server block. Mounted at /etc/nginx/conf.d/ which shadows the
    # default.conf shipped in nginx:alpine. The location = /config.js block
    # serves the InfCloud config from /etc/infcloud (mounted from the
    # infcloud-config ConfigMap above). The /radicale/ block is a
    # same-origin DAV proxy to the in-cluster radicale-service so the
    # browser never makes a cross-origin XHR.
    infcloud-nginx-conf:
      default.conf: |
        server {
            listen 8080;
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            client_max_body_size 100m;

            gzip on;
            gzip_types text/plain text/css application/javascript application/json image/svg+xml;
            gzip_min_length 1024;

            location = /config.js {
                alias /etc/infcloud/config.js;
                default_type application/javascript;
                add_header Cache-Control "no-store";
            }

            location /radicale/ {
                proxy_pass http://radicale-service:5232/;
                proxy_http_version 1.1;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Script-Name     /radicale;
                proxy_pass_request_headers on;
                proxy_read_timeout 90s;
            }

            location / {
                try_files $uri $uri/ =404;
            }
        }
