generic:
  deployment:
    image: nginx:1.27-alpine
    ports:
    - containerPort: 8080

    # Pinned upstream InfCloud commit. Bump and the init container re-fetches.
    initContainers:
      - name: fetch-infcloud
        image: alpine:3.23
        env:
          - name: INFCLOUD_COMMIT
            value: "53d3a95af5b58cfa3242cef645f8d40c731a7d95"
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -eu
            apk add --no-cache --quiet ca-certificates wget tar >/dev/null
            cd /tmp
            wget -qO infcloud.tar.gz "https://github.com/Unrud/RadicaleInfCloud/archive/${INFCLOUD_COMMIT}.tar.gz"
            tar -xzf infcloud.tar.gz
            cp -a "RadicaleInfCloud-${INFCLOUD_COMMIT}/radicale_infcloud/web/." /usr/share/nginx/html/
            # Make index.html load config-overrides.js right after upstream config.js.
            sed -i 's|<script src="config.js"[^>]*></script>|&\n\t<script src="config-overrides.js" type="text/javascript"></script>|' /usr/share/nginx/html/index.html
        volumeMounts:
          # Auto-generated name: <appName>-<emptyDirMount key>-volume.
          - name: infcloud-assets-volume
            mountPath: /usr/share/nginx/html

    emptyDirMounts:
      assets:
        mountPath: /usr/share/nginx/html

    configMapMounts:
      config:
        mountPath: /etc/infcloud
        configMapName: infcloud-config
      nginxconf:
        mountPath: /etc/nginx/conf.d
        configMapName: infcloud-nginx-conf

  service:
    ports:
    - name: http
      port: 8080

  ingress:
    https:
    - subdomain: contacts
      port: 8080
      oauth: true

  configMaps:
    # Loaded after upstream config.js; mutates the few globals we change.
    # See apps/infcloud/README.md for why we don't shadow config.js outright.
    infcloud-config:
      config-overrides.js: |
        globalNetworkCheckSettings.href = "https://contacts.{{ .Values.global.domain }}/radicale/";
        globalInterfaceLanguage = "de_DE";
        globalEnableDevelBuilds = false;

# nginx server block lives in apps/infcloud/files/nginx.conf and is wrapped
# into the infcloud-nginx-conf ConfigMap by templates/nginx-configmap.yaml.
