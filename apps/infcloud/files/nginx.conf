server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;
    client_body_buffer_size 256k;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Small overrides file mounted from a ConfigMap, served alongside the
    # upstream config.js that the init container drops into the emptyDir.
    location = /config-overrides.js {
        alias /etc/infcloud/config-overrides.js;
        default_type application/javascript;
        add_header Cache-Control "no-store";
    }

    # Same-origin DAV proxy. InfCloud's browser JS calls /radicale/...,
    # which we forward to the in-cluster Radicale Service. Keeping the
    # browser on contacts.<domain> avoids cross-origin XHRs entirely.
    location /radicale/ {
        proxy_pass http://radicale-service:5232/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name     /radicale;
        proxy_pass_request_headers on;
        proxy_read_timeout 90s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
