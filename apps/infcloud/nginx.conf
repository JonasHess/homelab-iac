server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tolerate large vCard / iCal uploads (multi-thousand-entry contact dumps).
    client_max_body_size 100m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # config.js is injected from a ConfigMap mounted at /etc/infcloud/.
    # The generic chart mounts ConfigMaps as directories (no subPath support),
    # so we serve the file from the mount path instead of overlaying it onto
    # the bundled InfCloud assets.
    location = /config.js {
        alias /etc/infcloud/config.js;
        default_type application/javascript;
        add_header Cache-Control "no-store";
    }

    # Same-origin DAV proxy. InfCloud's config.js points at /radicale/, so
    # the browser only ever talks to contacts.<domain> — no CORS preflight,
    # no Access-Control-Allow-* headers needed on Radicale.
    #
    # Native DAV clients (DAVx5, iOS, Thunderbird) keep using dav.<domain>
    # directly; this proxy exists only to give the browser-loaded JS a
    # same-origin path.
    location /radicale/ {
        proxy_pass http://radicale-service:5232/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Radicale's web UI uses X-Script-Name to build relative links;
        # without it, links generated by Radicale point at / instead of /radicale/.
        proxy_set_header X-Script-Name     /radicale;
        proxy_pass_request_headers on;
        proxy_read_timeout 90s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
