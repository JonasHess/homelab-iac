{{- /*
  Per-route SecurityPolicy that OPTS THIS ROUTE OUT of the Gateway-level OIDC.

  Envoy Gateway uses full-replace precedence: a route-level SP completely
  overrides the Gateway-level SP attached to the parent Gateway. So we emit
  a route-level SP only for routes that should NOT require OIDC (e.g. /api
  paths, webhooks, intentionally public routes). The body re-states the
  IP-allowlist (cloudflareCIDRs) since that's mandatory everywhere; OIDC is
  omitted, which is the whole point.

  Routes that should require OIDC don't emit anything from this template —
  they inherit the Gateway-level SP, which has both oidc and authorization.

  Trigger: `oauth: false` (or `oauth` absent) on the route. Routes meant to
  be auth-protected set `oauth: true`.
*/ -}}
{{- $appName := required "appName must be set in values.yaml" .Values.appName }}

{{- if .Values.ingress }}
  {{- if .Values.ingress.https }}
    {{- $gatewayNamespace := required "global.gateway.namespace must be set" $.Values.global.gateway.namespace }}
    {{- $security := $.Values.global.security | default dict }}
    {{- $cloudflareCIDRs := $security.cloudflareCIDRs | default (list) }}

    {{- range $index, $ingress := .Values.ingress.https }}
    {{- if not $ingress.oauth }}

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ $appName }}-securitypolicy-{{ $ingress.port }}-{{ $index }}
  namespace: {{ $gatewayNamespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=true,SkipDryRunOnMissingResource=true
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $appName }}-https-{{ $ingress.port }}-{{ $index }}
  authorization:
    defaultAction: Deny
    rules:
      - action: Allow
        principal:
          clientCIDRs:
            {{- range $cloudflareCIDRs }}
            - {{ . }}
            {{- end }}
    {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
