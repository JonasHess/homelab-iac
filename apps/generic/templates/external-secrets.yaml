{{- $appName := required "appName must be set in values.yaml" .Values.appName }}

{{- if .Values.externalSecrets }}
  {{- range $secretName, $secretData := .Values.externalSecrets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secretName }}-external-secret
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=true,SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ $.Values.global.externalSecrets.refreshInterval | default "1h" }}

  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $.Values.global.externalSecrets.clusterSecretStoreRef.name }}

  target:
    name: {{ $secretName }}
    creationPolicy: Owner

  data:
    {{- range $secret := $secretData }}
      {{- range $secretKey, $remotePath := $secret }}
        {{- /* Render the remote path through tpl so values.yaml entries can
               reference globals via Helm syntax — e.g.
               "{{ `{{ .Values.global.oidc.clientSecretAkeylessPath }}` }}".
               Plain "/foo/bar" paths are returned unchanged. */ -}}
        {{- $resolved := tpl ($remotePath | toString) $ }}
        {{- if not (hasPrefix "/" $resolved) }}
          {{- fail (printf "Remote path '%s' (resolved to '%s') must start with a '/' character" $remotePath $resolved) }}
        {{- end }}
    - secretKey: "{{ $secretKey }}"
      remoteRef:
        key: "{{ $.Values.global.akeyless.path }}{{ $resolved }}"
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}