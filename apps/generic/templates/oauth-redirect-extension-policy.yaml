{{- /*
  EnvoyExtensionPolicy with inline Lua that converts the 401 returned by
  oauth2-proxy /oauth2/auth (via SecurityPolicy.extAuth) into a 302 redirect
  to https://auth.<domain>/oauth2/start?rd=<original-url>. This replicates the
  UX of Traefik's old `errors` middleware so users land back on the route they
  were trying to reach after logging in.

  One policy per oauth-protected HTTPRoute (matches the SecurityPolicy.extAuth
  granularity) so unrelated 401s on non-oauth routes don't get rewritten.
*/ -}}
{{- $appName := required "appName must be set in values.yaml" .Values.appName }}

{{- if .Values.ingress }}
  {{- if .Values.ingress.https }}
    {{- $domain := required "global.domain must be set" $.Values.global.domain }}
    {{- $gatewayNamespace := required "global.gateway.namespace must be set" $.Values.global.gateway.namespace }}
    {{- $authURL := printf "https://auth.%s/oauth2/start" $domain }}

    {{- range $index, $ingress := .Values.ingress.https }}
    {{- if $ingress.oauth }}

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: {{ $appName }}-oauth-redirect-{{ $ingress.port }}-{{ $index }}
  namespace: {{ $gatewayNamespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=true,SkipDryRunOnMissingResource=true
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ $appName }}-https-{{ $ingress.port }}-{{ $index }}
  lua:
    - type: Inline
      inline: |
        local AUTH_URL = "{{ $authURL }}"

        -- RFC 3986 percent-encoding for the rd= query parameter.
        local function urlencode(s)
          if s == nil then return "" end
          return (s:gsub("([^%w%-_%.~])", function(c)
            return string.format("%%%02X", string.byte(c))
          end))
        end

        function envoy_on_request(handle)
          local h = handle:headers()
          local scheme = h:get(":scheme") or "https"
          local authority = h:get(":authority") or ""
          local path = h:get(":path") or "/"
          local original = scheme .. "://" .. authority .. path
          handle:streamInfo():dynamicMetadata():set(
            "homelab.oauth_redirect", "rd", urlencode(original))
        end

        function envoy_on_response(handle)
          local status = handle:headers():get(":status")
          -- Envoy converts oauth2-proxy's 401 from extAuth into 403
          -- (ext_authz_denied). Handle both so the rewrite works whichever
          -- code Envoy emits.
          if status ~= "401" and status ~= "403" then return end
          local md = handle:streamInfo():dynamicMetadata():get("homelab.oauth_redirect")
          local rd = (md and md.rd) or ""
          handle:headers():replace(":status", "302")
          handle:headers():replace("location", AUTH_URL .. "?rd=" .. rd)
          handle:headers():replace("content-length", "0")
          handle:headers():replace("content-type", "text/plain")
          handle:body():setBytes("")
        end
    {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
