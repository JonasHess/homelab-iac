{{- $appName := required "appName must be set in values.yaml" .Values.appName }}

{{- if .Values.ingress }}
  {{- if .Values.ingress.https }}
    {{- $domain := required "global.domain must be set in values.yaml" $.Values.global.domain }}
    {{- $gatewayName := required "global.gateway.name must be set" $.Values.global.gateway.name }}
    {{- $gatewayNamespace := required "global.gateway.namespace must be set" $.Values.global.gateway.namespace }}
    {{- range $index, $ingress := .Values.ingress.https }}

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $appName }}-https-{{ required "port must be specified for each HTTPS ingress" $ingress.port }}-{{ $index }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=true,SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ $gatewayName }}
      namespace: {{ $gatewayNamespace }}
      sectionName: {{ if $ingress.subdomain }}websecure{{ else }}websecure-apex{{ end }}
  hostnames:
    - {{ if $ingress.subdomain }}{{ $ingress.subdomain }}.{{ $domain }}{{ else }}{{ $domain }}{{ end }}
  rules:
    {{- if or $ingress.pathPrefixes $ingress.rawMatch }}
    {{- /* Routes with explicit path or raw matching */}}
    {{- if $ingress.pathPrefixes }}
    {{- range $prefix := $ingress.pathPrefixes }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $prefix }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: cloudflare
        {{- range $middleware := $ingress.middlewares }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ $middleware }}
        {{- end }}
      backendRefs:
        - name: {{ if $ingress.service }}{{ $ingress.service }}{{ else }}{{ $appName }}-service{{ end }}
          port: {{ $ingress.port }}
    {{- end }}
    {{- end }}
    {{- if $ingress.rawMatch }}
    {{- range $match := $ingress.rawMatch }}
    - matches:
        - {{- if $match.path }}
          path:
            type: {{ $match.path.type | default "PathPrefix" }}
            value: {{ $match.path.value }}
          {{- end }}
          {{- if $match.headers }}
          headers:
            {{- range $header := $match.headers }}
            - name: {{ $header.name }}
              type: {{ $header.type | default "Exact" }}
              value: {{ $header.value | quote }}
            {{- end }}
          {{- end }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: cloudflare
        {{- range $middleware := $ingress.middlewares }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ $middleware }}
        {{- end }}
      backendRefs:
        - name: {{ if $ingress.service }}{{ $ingress.service }}{{ else }}{{ $appName }}-service{{ end }}
          port: {{ $ingress.port }}
    {{- end }}
    {{- end }}
    {{- else }}
    {{- /* Catch-all route (no path matching) */}}
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: cloudflare
        {{- range $middleware := $ingress.middlewares }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ $middleware }}
        {{- end }}
      backendRefs:
        - name: {{ if $ingress.service }}{{ $ingress.service }}{{ else }}{{ $appName }}-service{{ end }}
          port: {{ $ingress.port }}
    {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
