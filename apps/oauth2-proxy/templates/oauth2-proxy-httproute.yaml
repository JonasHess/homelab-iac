apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth2-proxy
  namespace: {{ .Values.global.gateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Prune=true,SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: websecure
  hostnames:
    - auth.{{ required "global.domain must be set" .Values.global.domain }}
  rules:
    - backendRefs:
        - name: oauth2-proxy
          namespace: {{ $.Release.Namespace }}
          port: 80
