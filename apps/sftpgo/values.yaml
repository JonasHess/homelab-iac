generic:
  externalSecrets:
    sftpgo-secret:
      - SFTPGO_HTTPD__BINDINGS__0__OIDC__CLIENT_SECRET: "{{ .Values.global.oidc.clientSecretAkeylessPath }}"
  deployment:
    image: drakkan/sftpgo:v2.7.4
    ports:
      - containerPort: 8080
      - containerPort: 2222
      - containerPort: 2121
    pvcMounts:
      data:
        mountPath: /srv/sftpgo
        hostPath:   # /mnt/somewhere/encrypted/apps/sftpgo/data
        backup:
          enabled: true
      config:
        mountPath: /var/lib/sftpgo
        hostPath:   # /mnt/somewhere/unencrypted/apps/sftpgo/config
        backup:
          enabled: true
    envFrom:
      secretRef: sftpgo-secret
    configMapMounts:
      configmap:
        mountPath: /etc/sftpgo/
        configMapName: sftpgo-config
  service:
    ports:
      - name: http
        port: 8080
      - name: webdav
        port: 8081
      - name: sftp
        port: 2222
        protocol: TCP
      - name: ftp
        port: 2121
        protocol: TCP
  ingress:
    https:
      - subdomain: sftpgo
        port: 8080
        oauth: true
      - subdomain: sftpgo
        port: 8080
        pathPrefixes:
          - /web/client/pubshares/
        oauth: false
      - subdomain: webdav
        port: 8081
        oauth: false
    tcp:
      - port: 2222
        listener: sftpgo
      - port: 2121
        listener: ftp
