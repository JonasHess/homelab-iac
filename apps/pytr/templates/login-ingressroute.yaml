apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Values.appName }}-login-https
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.pytr.subdomain }}.{{ .Values.global.domain }}`)
      services:
        - name: {{ .Values.appName }}-login-service
          port: 8080
      middlewares:
        - name: oauth2-proxy
          namespace: {{ .Values.global.traefik.middlewareNamespace }}
  tls:
    certResolver: cloudflare
