apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Values.appName }}-download
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.appName }}
    component: download
spec:
  schedule: {{ .Values.pytr.download.schedule | quote }}
  suspend: {{ .Values.pytr.download.suspend }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: {{ .Values.appName }}
            component: download
        spec:
          restartPolicy: OnFailure
          containers:
          - name: download
            image: python:3.12-slim-bookworm
            command: ["sh", "-c"]
            envFrom:
            - secretRef:
                name: {{ .Values.appName }}-credentials
            args:
              - |
                export HOME=/home/pytr && \
                mkdir -p /home/pytr/.pytr && \
                printf '%s\n%s\n' "$PHONE_NUMBER" "$PIN" > /tmp/credentials && \
                ln -sf /tmp/credentials /home/pytr/.pytr/credentials && \
                pip install --quiet pytr=={{ .Values.pytr.pytrVersion }} && \
                pytr dl_docs -path /downloads && \
                chown -R 1000:1000 /downloads && \
                chmod -R u+rwX /downloads
            volumeMounts:
            - name: pytr-session
              mountPath: /home/pytr/.pytr
            - name: pytr-downloads
              mountPath: /downloads
            - name: tmp
              mountPath: /tmp
          volumes:
          - name: pytr-session
            persistentVolumeClaim:
              claimName: {{ .Values.appName }}-credentials-pvc
          - name: pytr-downloads
            persistentVolumeClaim:
              claimName: {{ .Values.appName }}-downloads-pvc
          - name: tmp
            emptyDir:
              medium: Memory
