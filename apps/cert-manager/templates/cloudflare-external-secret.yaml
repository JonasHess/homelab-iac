apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-credentials-external-secret
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-options: Prune=true,SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: {{ .Values.global.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.global.externalSecrets.clusterSecretStoreRef.name }}
  target:
    name: cloudflare-api-credentials
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: "{{ .Values.global.akeyless.path }}/acme/cloudflare-api-credentials_apiKey"
