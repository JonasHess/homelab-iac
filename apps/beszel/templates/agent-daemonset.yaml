{{- $appName := required "appName must be set in values.yaml" .Values.appName }}
{{- $agent := .Values.agent | default dict }}
{{- if $agent.enabled }}
{{- $agentSecret := printf "%s-agent-env" $appName }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $appName }}-agent
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $appName }}-agent
spec:
  selector:
    matchLabels:
      app: {{ $appName }}-agent
  template:
    metadata:
      labels:
        app: {{ $appName }}-agent
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      hostNetwork: true
      hostPID: true
      # ClusterFirstWithHostNet lets the pod use cluster DNS even though
      # it shares the host's network namespace — needed so HUB_URL can
      # resolve via the in-cluster Service name.
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          image: {{ $agent.image | default "henrygd/beszel-agent:0.18.7" }}
          imagePullPolicy: IfNotPresent
          env:
            - name: LISTEN
              value: {{ $agent.listen | default "45876" | quote }}
            - name: HUB_URL
              value: {{ required "agent.hubUrl must be set" $agent.hubUrl | quote }}
          # KEY (hub pubkey, for verifying hub signatures) and TOKEN
          # (Universal Token, for self-registration) are populated by the
          # bootstrap Job — see templates/bootstrap-script.yaml.
          envFrom:
            - secretRef:
                name: {{ $agentSecret }}
          {{- if $agent.containerSocket }}
          volumeMounts:
            - name: container-socket
              mountPath: /var/run/docker.sock
              readOnly: true
          {{- end }}
      {{- if $agent.containerSocket }}
      volumes:
        - name: container-socket
          hostPath:
            path: {{ $agent.containerSocket | quote }}
            type: Socket
      {{- end }}
{{- end }}
