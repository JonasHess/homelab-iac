{{- $appName := required "appName must be set in values.yaml" .Values.appName }}
{{- $bootstrap := .Values.bootstrap | default dict }}
{{- if $bootstrap.enabled }}
{{- $agentSecret := printf "%s-agent-env" $appName }}
{{- $hubSecret := printf "%s-hub-config" $appName }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $appName }}-bootstrap
  namespace: {{ $.Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $appName }}-bootstrap
  namespace: {{ $.Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $appName }}-bootstrap
  namespace: {{ $.Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ $appName }}-bootstrap
    namespace: {{ $.Release.Namespace }}
roleRef:
  kind: Role
  name: {{ $appName }}-bootstrap
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $appName }}-bootstrap
  namespace: {{ $.Release.Namespace }}
  annotations:
    # Sync hook runs during the sync itself — PostSync deadlocks because
    # the agent DaemonSet can't be healthy until this Job writes the
    # Secret. HookSucceeded clears the Job after success so the next
    # sync recreates it; the script's idempotency check makes that safe.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: {{ $appName }}-bootstrap
    spec:
      serviceAccountName: {{ $appName }}-bootstrap
      restartPolicy: OnFailure
      volumes:
        - name: hub-data
          persistentVolumeClaim:
            claimName: {{ $appName }}-data-pvc
        - name: script
          configMap:
            name: {{ $appName }}-bootstrap-script
      containers:
        - name: bootstrap
          image: {{ $bootstrap.image | default "alpine:3.20" }}
          command: ["sh", "/script/bootstrap.sh"]
          volumeMounts:
            - name: hub-data
              mountPath: /beszel_data
            - name: script
              mountPath: /script
          env:
            - name: HUB_URL
              value: "http://{{ $appName }}-service.{{ $.Release.Namespace }}.svc.cluster.local:8090"
            - name: NAMESPACE
              value: {{ $.Release.Namespace | quote }}
            - name: AGENT_SECRET_NAME
              value: {{ $agentSecret | quote }}
          envFrom:
            # USER_EMAIL + USER_PASSWORD — same Secret the hub Deployment
            # uses to auto-create the admin. Single source of truth.
            - secretRef:
                name: {{ $hubSecret }}
{{- end }}
