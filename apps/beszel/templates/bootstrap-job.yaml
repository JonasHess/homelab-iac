{{- $appName := required "appName must be set in values.yaml" .Values.appName }}
{{- $bootstrap := .Values.bootstrap | default dict }}
{{- $generic := .Values.generic | default dict }}
{{- $cfg := (index ($generic.configMaps | default dict) "beszel-hub-config") | default dict }}
{{- if $bootstrap.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $appName }}-bootstrap
  namespace: {{ $.Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $appName }}-bootstrap
  namespace: {{ $.Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $appName }}-bootstrap
  namespace: {{ $.Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ $appName }}-bootstrap
    namespace: {{ $.Release.Namespace }}
roleRef:
  kind: Role
  name: {{ $appName }}-bootstrap
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $appName }}-bootstrap
  namespace: {{ $.Release.Namespace }}
  annotations:
    # PostSync runs after the hub Deployment is reconciled; HookSucceeded
    # removes the Job object on success so the next sync re-creates it
    # cleanly (idempotent inside the script handles the no-op case).
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: {{ $appName }}-bootstrap
    spec:
      serviceAccountName: {{ $appName }}-bootstrap
      restartPolicy: OnFailure
      volumes:
        - name: hub-data
          persistentVolumeClaim:
            claimName: {{ $appName }}-data-pvc
      containers:
        - name: bootstrap
          image: {{ $bootstrap.image | default "alpine:3.20" }}
          volumeMounts:
            - name: hub-data
              mountPath: /beszel_data
              readOnly: true
          env:
            - name: HUB_URL
              value: "http://{{ $appName }}-service.{{ $.Release.Namespace }}.svc.cluster.local:8090"
            - name: NAMESPACE
              value: {{ $.Release.Namespace | quote }}
            - name: SECRET_NAME
              value: {{ $bootstrap.agentSecretName | default "beszel-agent-env" | quote }}
            - name: APP_NAME
              value: {{ $appName | quote }}
            - name: BESZEL_USER_EMAIL
              value: {{ $cfg.USER_EMAIL | default "bootstrap@beszel.local" | quote }}
            - name: BESZEL_USER_PASSWORD
              value: {{ $cfg.USER_PASSWORD | default "beszel-internal-bootstrap" | quote }}
          command: ["sh", "-c"]
          args:
            - |
              set -eu

              echo "[bootstrap] installing tools..."
              apk add --no-cache curl jq openssh-keygen kubectl >/dev/null

              echo "[bootstrap] waiting for hub at $HUB_URL ..."
              for i in $(seq 1 60); do
                if curl -sf -o /dev/null "$HUB_URL/api/health"; then
                  echo "[bootstrap] hub is healthy"
                  break
                fi
                sleep 3
              done

              # Idempotency: if the Secret already carries a non-empty TOKEN,
              # we're done. Re-runs after the Job is recreated by ArgoCD
              # short-circuit here so we don't churn the agent.
              EXISTING=$(kubectl -n "$NAMESPACE" get secret "$SECRET_NAME" \
                -o jsonpath='{.data.TOKEN}' 2>/dev/null || true)
              if [ -n "$EXISTING" ]; then
                echo "[bootstrap] secret $SECRET_NAME already populated, nothing to do"
                exit 0
              fi

              echo "[bootstrap] authenticating as $BESZEL_USER_EMAIL ..."
              AUTH=$(curl -sf -X POST "$HUB_URL/api/collections/users/auth-with-password" \
                -H "Content-Type: application/json" \
                -d "{\"identity\":\"$BESZEL_USER_EMAIL\",\"password\":\"$BESZEL_USER_PASSWORD\"}") \
                || { echo "[bootstrap] auth failed"; exit 1; }
              JWT=$(echo "$AUTH" | jq -r '.token')
              [ -n "$JWT" ] && [ "$JWT" != "null" ] || { echo "[bootstrap] no JWT in auth response"; exit 1; }

              echo "[bootstrap] enabling Universal Token ..."
              TR=$(curl -sf -X GET "$HUB_URL/api/beszel/universal-token?enable=1" \
                -H "Authorization: $JWT") \
                || { echo "[bootstrap] enable failed"; exit 1; }
              TOKEN=$(echo "$TR" | jq -r '.token // empty')
              [ -n "$TOKEN" ] || { echo "[bootstrap] no token in response: $TR"; exit 1; }

              echo "[bootstrap] deriving hub pubkey ..."
              if [ ! -f /beszel_data/id_ed25519 ]; then
                echo "[bootstrap] hub keypair not present at /beszel_data/id_ed25519"
                exit 1
              fi
              KEY=$(ssh-keygen -y -f /beszel_data/id_ed25519)
              [ -n "$KEY" ] || { echo "[bootstrap] empty pubkey"; exit 1; }

              echo "[bootstrap] writing Secret $SECRET_NAME ..."
              kubectl -n "$NAMESPACE" create secret generic "$SECRET_NAME" \
                --from-literal=KEY="$KEY" \
                --from-literal=TOKEN="$TOKEN" \
                --dry-run=client -o yaml \
                | kubectl apply -f -

              echo "[bootstrap] done."
{{- end }}
