{{- $appName := required "appName must be set in values.yaml" .Values.appName }}
{{- $auth := required "auth block must be set in values.yaml" .Values.auth }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $appName }}-hub-config
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $appName }}
type: Opaque
stringData:
  USER_EMAIL: {{ required "auth.email must be set" $auth.email | quote }}
  USER_PASSWORD: {{ required "auth.password must be set" $auth.password | quote }}
  # AUTO_LOGIN accepts an email — same as USER_EMAIL — so anyone who
  # passes the gateway's OIDC check lands directly in the hub UI.
  AUTO_LOGIN: {{ $auth.email | quote }}
