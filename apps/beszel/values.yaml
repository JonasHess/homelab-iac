generic:
  deployment:
    image: henrygd/beszel:0.18.7
    ports:
    - containerPort: 8090
    pvcMounts:
      data:
        mountPath: /beszel_data
        hostPath: ~ # /mnt/somewhere/unencrypted/apps/beszel/data
        backup:
          enabled: true
    # Hub admin user is auto-created from this Secret on first boot;
    # AUTO_LOGIN lets any OIDC-authenticated visitor enter without
    # seeing Beszel's password form. Rendered by hub-config-secret.yaml.
    envFrom:
      secretRef: beszel-hub-config
  service:
    ports:
    - name: http
      port: 8090
  ingress:
    https:
    - subdomain: beszel
      port: 8090
      oauth: true

# Hub admin credentials. The hub creates the user from these on first
# boot and the bootstrap Job authenticates as the same user. External
# access is OIDC-gated at the Envoy Gateway and AUTO_LOGIN bypasses
# Beszel's own form, so the password is never used outside the cluster.
auth:
  email: bootstrap@beszel.local
  password: beszel-internal-bootstrap-password-not-used-externally

# Bootstrap Job — runs once per sync. Auths via Beszel API, enables a
# permanent Universal Token, reads the hub's pubkey from the shared PV,
# and writes both into the agent's envFrom Secret. Idempotent.
bootstrap:
  enabled: true
  image: alpine:3.23

# Agent DaemonSet — off by default; opt in per environment.
agent:
  enabled: false
  image: henrygd/beszel-agent:0.18.7
  listen: "45876"
  # Cluster-internal Service URL. Agents reach it via cluster DNS
  # (the DaemonSet sets dnsPolicy: ClusterFirstWithHostNet so cluster
  # DNS resolves alongside hostNetwork).
  hubUrl: http://beszel-service.argocd.svc.cluster.local:8090
  # Host runtime socket — optional. Host CPU/RAM/disk work without it.
  containerSocket: ~
