generic:
  deployment:
    image: henrygd/beszel:0.18.7
    ports:
    - containerPort: 8090
    pvcMounts:
      data:
        mountPath: /beszel_data
        hostPath: ~ # /mnt/somewhere/unencrypted/apps/beszel/data
        backup:
          enabled: true
  service:
    ports:
    - name: http
      port: 8090
  ingress:
    https:
    - subdomain: beszel
      port: 8090
      oauth: true
  # Universal Token used by agents to self-register over WebSocket.
  # Generated once in the hub UI at /settings/tokens (after first boot),
  # then mirrored into Akeyless. From then on, every new agent picks it
  # up automatically — no UI clicks per system.
  externalSecrets:
    beszel-token:
      - TOKEN: /beszel/UNIVERSAL_TOKEN

# Agent DaemonSet — rendered by apps/beszel/templates/agent-daemonset.yaml.
# Off by default; opt in per-environment.
agent:
  enabled: false
  image: henrygd/beszel-agent:0.18.7
  listen: "45876"
  # Where the agent connects to the hub. Cluster-internal Service URL by
  # default — agents reach it via cluster DNS (the DaemonSet uses
  # dnsPolicy: ClusterFirstWithHostNet so cluster DNS works alongside
  # hostNetwork). Override if the hub lives in a different cluster.
  hubUrl: http://beszel-service.argocd.svc.cluster.local:8090
  tokenSecret: beszel-token
  # Path on the host to the container runtime socket. Defaults to standard
  # Docker; microk8s/containerd environments can override or set to null
  # (host CPU/RAM/disk metrics work regardless).
  containerSocket: ~
