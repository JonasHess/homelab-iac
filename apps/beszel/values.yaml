generic:
  deployment:
    image: henrygd/beszel:0.18.7
    ports:
    - containerPort: 8090
    pvcMounts:
      data:
        mountPath: /beszel_data
        hostPath: ~ # /mnt/somewhere/unencrypted/apps/beszel/data
        backup:
          enabled: true
    # USER_EMAIL + USER_PASSWORD auto-create the PocketBase admin user on
    # first boot (no UI step). AUTO_LOGIN bypasses Beszel's password auth
    # for any request — safe here because external access is gated by
    # Cognito OIDC at the Envoy Gateway; the password is only used
    # internally by the bootstrap Job and never exposed.
    envFrom:
      configMapRef: beszel-hub-config
  configMaps:
    beszel-hub-config:
      USER_EMAIL: "bootstrap@beszel.local"
      USER_PASSWORD: "beszel-internal-bootstrap-password-not-used-externally"
      AUTO_LOGIN: "bootstrap@beszel.local"
  service:
    ports:
    - name: http
      port: 8090
  ingress:
    https:
    - subdomain: beszel
      port: 8090
      oauth: true

# Bootstrap Job — runs once after hub is ready. Auths via Beszel API,
# enables the Universal Token, derives the hub's pubkey, writes both as
# a K8s Secret consumed by the agent. Idempotent: if the Secret already
# carries TOKEN, the Job exits 0 without touching anything.
bootstrap:
  enabled: true
  image: alpine:3.20
  agentSecretName: beszel-agent-env

# Agent DaemonSet — rendered by apps/beszel/templates/agent-daemonset.yaml.
# Off by default; opt in per-environment.
agent:
  enabled: false
  image: henrygd/beszel-agent:0.18.7
  listen: "45876"
  # Where the agent connects to the hub. Cluster-internal Service URL by
  # default — agents reach it via cluster DNS (the DaemonSet uses
  # dnsPolicy: ClusterFirstWithHostNet so cluster DNS works alongside
  # hostNetwork). Override if the hub lives in a different cluster.
  hubUrl: http://beszel-service.argocd.svc.cluster.local:8090
  envSecret: beszel-agent-env
  # Path on the host to the container runtime socket. Defaults to standard
  # Docker; microk8s/containerd environments can override or set to null
  # (host CPU/RAM/disk metrics work regardless).
  containerSocket: ~
