generic:
  deployment:
    image: ghcr.io/servercontainers/samba:smbd-wsdd2-a3.23.3-s4.22.8-r0
    ports:
      - containerPort: 445
    # Shares and their backing pvcMounts are defined per-environment in
    # homelab-environments/<env>/values.yaml. Example:
    # pvcMounts:
    #   media:
    #     mountPath: /shares/media
    #     hostPath: /mnt/tank0/encrypted/media
    envFrom:
      configMapRef: samba-config
      secretRef: samba-secret
  service:
    ports:
      - name: smb
        port: 445
        protocol: TCP
  ingress:
    tcp:
      - port: 445
        listener: samba

samba:
  workgroup: WORKGROUP
  serverString: "Server"
  # Each share entry must have a matching generic.deployment.pvcMounts key of
  # the same name. Defined per-environment in homelab-environments/<env>/values.yaml.
  # Example:
  # shares:
  #   - name: media
  #     path: /shares/media
  #     guest: false
  #     readOnly: false
  #     browseable: true
  #     validUsers: ["@family"]
  #     writeList: ["@admin"]
  shares: []
  # Groups for share-level ACLs. Rendered as GROUP_<name>=<gid> env vars.
  # Example:
  # groups:
  #   - name: family
  #     gid: 1500
  groups: []
  # Samba user accounts. Passwords are fetched from Akeyless via ExternalSecret.
  # Example:
  # users:
  #   - name: alice
  #     akeylessPath: "/samba/alice/password"
  #     uid: 1000              # optional, sets UID_<name>
  #     groups: [family, admin] # optional, sets GROUPS_<name>
  users: []
  # mDNS/Bonjour publisher for macOS Finder autodiscovery.
  # Runs a separate hostNetwork pod that advertises _smb._tcp
  # pointing at the Envoy Gateway LoadBalancer IP.
  avahi:
    enabled: false
    # publishIP: "192.168.1.80"  # REQUIRED: Gateway LB IP reachable on LAN
    # hostname: samba             # becomes <hostname>.local in mDNS
    # serviceName: Samba          # display name shown in Finder
    # servicePort: "445"

  # WS-Discovery publisher for Windows File Explorer → Network autodiscovery.
  # Runs a separate hostNetwork pod that responds to WSD multicast probes,
  # announcing the SMB server at publishIP. Defaults inherit from samba.avahi
  # and samba.workgroup so a typical config only needs `enabled: true` and
  # `publishIP`.
  wsdd:
    enabled: false
    # publishIP: "192.168.1.80"   # REQUIRED: Gateway LB IP, same as avahi.publishIP
    # hostname: nudelkiste         # NetBIOS-style name; defaults to avahi.hostname / lowercased serverString
    # workgroup: WORKGROUP         # defaults to samba.workgroup
    # interface: eth0              # LAN interface on the node; default eth0
