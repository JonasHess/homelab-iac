{{- /*
  Per-route SP only for the webhook route, which must NOT require OIDC
  (external services posting webhooks can't carry an OIDC session cookie).
  Body is "allow all" — listener-level gates (LAN topology / Cloudflare
  mTLS) handle access control.

  The main route inherits the Gateway-level SP (OIDC) from apps/envoy-gateway.
*/ -}}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: argocd-securitypolicy-webhook
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: argocd-https-webhook
  authorization:
    defaultAction: Allow
