{{- /*
  Per-route SP only for the webhook route, which must NOT require OIDC
  (external services posting webhooks can't carry an OIDC session cookie).

  The main route inherits the Gateway-level SP (oidc + cloudflareCIDRs) from
  apps/envoy-gateway, so no per-route SP is emitted for it.
*/ -}}
{{- $security := $.Values.global.security | default dict }}
{{- $cloudflareCIDRs := $security.cloudflareCIDRs | default (list) }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: argocd-securitypolicy-webhook
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: argocd-https-webhook
  authorization:
    defaultAction: Deny
    rules:
      - action: Allow
        principal:
          clientCIDRs:
            {{- range $cloudflareCIDRs }}
            - {{ . }}
            {{- end }}
