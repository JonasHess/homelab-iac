{{- $security := $.Values.global.security | default dict }}
{{- $publicListeners := and (hasKey $security "cloudflareOriginCA") (ne ($security.cloudflareOriginCA | default "") "") }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-https-webhook
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: websecure
    {{- if $publicListeners }}
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: websecure-public
    {{- end }}
  hostnames:
    - argocd.{{ .Values.global.domain }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/webhook
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: argocd-server-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-https-main
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: websecure
    {{- if $publicListeners }}
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: websecure-public
    {{- end }}
  hostnames:
    - argocd.{{ .Values.global.domain }}
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: argocd-server-tls
