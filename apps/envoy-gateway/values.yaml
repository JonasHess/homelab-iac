global:
  domain: ~
  akeyless:
    path: ~
  # OIDC config for the Gateway-level SecurityPolicy. Per-environment
  # overrides live in homelab-environments/<env>/values.yaml.
  oidc:
    issuerUrl: ~
    clientId: ~
    cookieDomain: ~

# LoadBalancer external IP for the Envoy data-plane Service.
# Set per-environment in homelab-environments/<env>/values.yaml.
loadBalancerIP: null

# Akeyless path (relative to global.akeyless.path) for the Cognito client
# secret. Same layout the previous oauth2-proxy deployment used.
oidcClientSecretAkeylessPath: /oidc/oauth2-proxy/client_secret

# Additional listener ports beyond HTTP/HTTPS, exposed via the Gateway
# resource. Each entry adds a listener with the given port + protocol.
#
# No defaults here on purpose: each env explicitly declares only the
# listeners it actually needs. We tried defaulting to a superset and
# letting envs disable unwanted listeners with `key: null`, but that
# silently breaks — ArgoCD persists the Application CR via the K8s API
# server, which strips nil-valued map keys before storage, so the
# nulls never reach the chart and the chart defaults always win.
additionalExposedPorts: {}

envoyGateway:
  # Upstream Envoy Gateway helm chart version (oci://docker.io/envoyproxy/gateway-helm).
  chartVersion: v1.8.0
  # Namespace where the controller installs (data plane is provisioned here too by default).
  namespace: envoy-gateway-system
