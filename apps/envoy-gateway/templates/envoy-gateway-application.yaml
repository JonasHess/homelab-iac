apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway-controller
  # Child ArgoCD Applications must live in the same namespace as the parent
  # app — the namespace the application-controller watches — not the parent's
  # workload namespace. Single source of truth: global.argocd.namespace.
  namespace: {{ $.Values.global.argocd.namespace | default "argocd" }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  project: default
  source:
    chart: gateway-helm
    repoURL: docker.io/envoyproxy
    targetRevision: {{ .Values.envoyGateway.chartVersion }}
    helm:
      valuesObject:
        config:
          envoyGateway:
            provider:
              type: Kubernetes
            # Required so apps/argocd/templates/argocd-server-backend.yaml
            # (Backend CR with insecureSkipVerify: true) is reconciled. Without
            # this flag the Backend is ignored and HTTPRoutes that target it
            # have no upstream → 404 from Envoy.
            extensionApis:
              enableBackend: true
        deployment:
          envoyGateway:
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ .Values.envoyGateway.namespace }}
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - allowEmpty=true
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
