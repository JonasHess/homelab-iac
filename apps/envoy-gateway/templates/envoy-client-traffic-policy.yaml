{{- /*
  Tell Envoy where to find the real client IP. Cloudflare-proxied requests
  carry the original visitor IP in `CF-Connecting-IP`; LAN-direct requests
  don't carry this header and fall back to the TCP source IP.

  `failClosed: false` is deliberate — LAN clients legitimately won't have
  the header. Spoofing CF-Connecting-IP isn't a concern because the only
  way to reach a listener that consults this CTP is via the LAN VLAN
  (websecure / websecure-apex) or through Cloudflare's mTLS handshake on
  the public listener pair (gated by envoy-mtls-client-traffic-policy.yaml).

  This is also Cloudflare's documented recommendation for Envoy Gateway —
  see https://developers.cloudflare.com/support/troubleshooting/restoring-visitor-ips/restoring-original-visitor-ips/
*/ -}}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: envoy-gateway-client-ip-detection
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
  clientIPDetection:
    customHeader:
      name: CF-Connecting-IP
      failClosed: false
