{{- /*
  Gateway-attached SecurityPolicy. Single concern: enforce OIDC against
  Cognito for every route that inherits this SP. One HMAC + one cookie set
  scoped to global.oidc.cookieDomain means a single Cognito callback URL
  covers every subdomain.

  No `authorization` block. Access control happens at the listener layer:
   - The LAN listener (websecure / websecure-apex, port 443) only accepts
     connections from devices on the LAN VLAN — MetalLB only announces
     192.168.1.80 there.
   - The Cloudflare-facing listener (websecure-public[-apex], port 4443)
     requires mTLS, validated against the cloudflare-origin-ca ConfigMap
     by the envoy-gateway-mtls ClientTrafficPolicy. Anything not presenting
     a Cloudflare-signed leaf cert is rejected before any HTTP filter runs.

  Per-route opt-out SPs (oauth: false) still emit their own authorization
  block today; that's an inherited concern from the previous design and
  effectively keeps those routes LAN-only. Will be revisited if/when
  external services need to hit them through Cloudflare.
*/ -}}
{{- $domain := required "global.domain must be set" .Values.global.domain }}
{{- $oidc := required "global.oidc must be set" .Values.global.oidc }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: gateway-oidc
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
  oidc:
    provider:
      issuer: {{ required "global.oidc.issuerUrl must be set" $oidc.issuerUrl | quote }}
    clientID: {{ required "global.oidc.clientId must be set" $oidc.clientId | quote }}
    clientSecret:
      name: oidc-client-secret
    redirectURL: "https://auth.{{ $domain }}/oauth2/callback"
    logoutPath: /oauth2/logout
    scopes:
      - openid
      - email
    {{- if $oidc.cookieDomain }}
    cookieDomain: {{ $oidc.cookieDomain | quote }}
    {{- end }}
