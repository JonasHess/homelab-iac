{{- /*
  Gateway-attached SecurityPolicy:
   - native OIDC against Cognito (one HMAC, one cookie set scoped to
     global.oidc.cookieDomain, one Cognito callback URL).
   - authorization with a single Allow rule for LAN source IPs.

  Cloudflare-proxied traffic does NOT pass this authorization rule — it
  enters via the dedicated mTLS listener (port 4443 / Authenticated Origin
  Pulls), where the listener-level cert validation gates the connection
  before any HTTP filter runs. That's why we don't need a second Allow rule
  here.

  Per-route opt-out SPs must re-emit this `authorization` block (Envoy
  Gateway uses full-replace precedence between Gateway-level and route-level
  SPs).
*/ -}}
{{- $domain := required "global.domain must be set" .Values.global.domain }}
{{- $oidc := required "global.oidc must be set" .Values.global.oidc }}
{{- $security := required "global.security must be set" .Values.global.security }}
{{- $lanCIDRs := $security.lanCIDRs | default (list) }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: gateway-oidc
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
  oidc:
    provider:
      issuer: {{ required "global.oidc.issuerUrl must be set" $oidc.issuerUrl | quote }}
    clientID: {{ required "global.oidc.clientId must be set" $oidc.clientId | quote }}
    clientSecret:
      name: oidc-client-secret
    redirectURL: "https://auth.{{ $domain }}/oauth2/callback"
    logoutPath: /oauth2/logout
    scopes:
      - openid
      - email
    {{- if $oidc.cookieDomain }}
    cookieDomain: {{ $oidc.cookieDomain | quote }}
    {{- end }}
  authorization:
    defaultAction: Deny
    rules:
      - name: lan
        action: Allow
        principal:
          clientCIDRs:
            {{- range $lanCIDRs }}
            - {{ . }}
            {{- end }}
