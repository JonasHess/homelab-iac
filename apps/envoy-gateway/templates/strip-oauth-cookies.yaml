{{- /*
  Strip the Envoy OAuth2 filter's cookies from the Cookie header before the
  request reaches the upstream pod. The pods don't need IdToken/AccessToken/etc
  (Envoy validates them locally) and these cookies are large enough to bust
  Node.js (16 KB) and Tomcat (~8 KB) default header limits, producing HTTP 431.

  Targets the Gateway, so every route inherits the stripper.
*/ -}}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: strip-oauth-cookies
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
  lua:
    - type: Inline
      inline: |
        -- Cookie names set by Envoy's OAuth2 filter. Listed explicitly so we
        -- don't accidentally drop app-defined cookies that happen to start
        -- with similar prefixes.
        local STRIP = {
          IdToken      = true,
          AccessToken  = true,
          RefreshToken = true,
          BearerToken  = true,
          OauthHMAC    = true,
          OauthExpires = true,
          OauthNonce   = true,
        }

        local function trim(s)
          return (s:gsub("^%s*(.-)%s*$", "%1"))
        end

        function envoy_on_request(req)
          local cookie = req:headers():get("cookie")
          if not cookie then return end
          local kept = {}
          for piece in string.gmatch(cookie, "([^;]+)") do
            local p = trim(piece)
            local name = p:match("^([^=]+)")
            if name and not STRIP[trim(name)] then
              kept[#kept + 1] = p
            end
          end
          if #kept == 0 then
            req:headers():remove("cookie")
          else
            req:headers():replace("cookie", table.concat(kept, "; "))
          end
        end
