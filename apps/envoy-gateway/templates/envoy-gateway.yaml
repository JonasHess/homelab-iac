apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-gateway
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  gatewayClassName: envoy-gateway
  {{- if .Values.loadBalancerIP }}
  addresses:
    - type: IPAddress
      value: {{ .Values.loadBalancerIP | quote }}
  {{- end }}
  listeners:
    - name: web
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: websecure
      port: 443
      protocol: HTTPS
      hostname: "*.{{ .Values.global.domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: websecure-apex
      port: 443
      protocol: HTTPS
      hostname: "{{ .Values.global.domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    {{- if (.Values.global.security | default dict).cloudflareOriginCA }}
    # Cloudflare-only listeners (port 4443). The router NATs WAN:443 to this
    # port; LAN clients use the regular `websecure` listener on 443 instead.
    #
    # mTLS is NOT configured on the Gateway listener itself — `tls.frontendValidation`
    # is part of Gateway API's experimental channel and gets silently
    # stripped by the API server because the cluster runs standard-channel
    # CRDs. Instead, the mTLS requirement is attached via the Envoy-Gateway-
    # native `ClientTrafficPolicy` in templates/envoy-mtls-client-traffic-policy.yaml,
    # which targets these listeners by `sectionName`.
    - name: websecure-public
      port: 4443
      protocol: HTTPS
      hostname: "*.{{ .Values.global.domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: websecure-public-apex
      port: 4443
      protocol: HTTPS
      hostname: "{{ .Values.global.domain }}"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
    {{- range $key, $value := .Values.additionalExposedPorts }}
    - name: {{ $key }}
      port: {{ $value.port }}
      protocol: {{ $value.protocol }}
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
