apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-proxy-config
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  # Expose Prometheus-format proxy metrics on :19001/stats/prometheus.
  # Scraped by the PodMonitor in envoy-proxy-podmonitor.yaml.
  telemetry:
    metrics:
      prometheus: {}
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        externalTrafficPolicy: Local
        # Note: the static external IP is set on the Gateway resource via
        # spec.addresses (see envoy-gateway.yaml). The EnvoyProxy CRD's
        # envoyService schema does not expose Service.spec.externalIPs.
